<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Music Studio 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#050e1a;color:#c8ddf0;font-family:'Inter',sans-serif;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#050e1a}::-webkit-scrollbar-thumb{background:#1a3050;border-radius:2px}
textarea,input{outline:none!important;font-family:'Inter',sans-serif}
button{font-family:'Inter',sans-serif;cursor:pointer}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse3{0%,100%{opacity:.07}50%{opacity:.13}}
@keyframes wavepulse{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}

.nav{height:46px;background:#030c18;border-bottom:1px solid #0f2030;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.nav-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f97316,#ef4444);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.nav-tab{padding:5px 12px;border-radius:6px;border:none;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:#2d5070;transition:all .2s}
.nav-tab.active{background:#0d1e35;color:#f97316}

.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 46px)}

.sidebar{width:310px;flex-shrink:0;background:#030c18;border-right:1px solid #0f2030;display:flex;flex-direction:column;overflow:hidden}
.sb-scroll{flex:1;overflow-y:auto;padding:12px 13px 0}
.sb-foot{padding:11px 13px;border-top:1px solid #0f2030;flex-shrink:0}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#050e1a}
.c-scroll{flex:1;overflow-y:auto}

.fl{font-size:9px;color:#2d5070;letter-spacing:2px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px}
.fi{width:100%;background:#081525;border:1px solid #1a3050;color:#c8ddf0;padding:7px 10px;border-radius:7px;font-size:11px;transition:border-color .2s}
.fi:focus{border-color:#f97316}
.fta{width:100%;background:#081525;border:1px solid #1a3050;color:#c8ddf0;padding:8px 10px;border-radius:7px;font-size:12px;resize:none;line-height:1.6;transition:border-color .2s}
.fta:focus{border-color:#f97316}
.fsec{margin-bottom:12px}
.div{height:1px;background:#0f2030;margin:0 0 12px}

.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border-radius:16px;font-size:10px;border:1px solid #1a3050;background:transparent;color:#3d6080;transition:all .15s;white-space:nowrap}
.chip:hover{color:#5a80a0;border-color:#2a4060}
.chip.co{border-color:#f97316;background:#f9731620;color:#f97316;font-weight:600}
.chip.cr{border-color:#ef4444;background:#ef444420;color:#ef4444;font-weight:600}
.chip.cb{border-color:#3b82f6;background:#3b82f620;color:#3b82f6;font-weight:600}
.chip.cg{border-color:#22c55e;background:#22c55e20;color:#22c55e;font-weight:600}
.chip.cp{border-color:#a855f7;background:#a855f720;color:#a855f7;font-weight:600}
.chip.cy{border-color:#eab308;background:#eab30820;color:#eab308;font-weight:600}

.dur-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dur-card{padding:8px;border-radius:8px;cursor:pointer;text-align:left;border:1px solid #1a3050;background:#081525;transition:all .15s}
.dur-card.sel{border-color:#f97316;background:#f9731618}

.btn-val{width:100%;margin-top:5px;padding:7px;border-radius:7px;border:1px solid #f9731440;background:#f9731615;color:#f97316;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.btn-val.ok{border-color:#22c55e50;background:#22c55e15;color:#22c55e}
.btn-val.err{border-color:#ef444450;background:#ef444415;color:#ef4444}

.btn-gen{width:100%;padding:13px;border-radius:9px;border:none;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-size:13px;font-weight:700;transition:all .3s;box-shadow:0 4px 18px #f9731635;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gen:disabled{background:#0d1e35;color:#1e3a5f;box-shadow:none;cursor:not-allowed}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:40px;text-align:center}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;max-width:380px}
.feat-card{background:#081525;border:1px solid #0f2030;border-radius:8px;padding:9px 12px;font-size:11px;color:#1a3050;display:flex;align-items:center;gap:7px}

.r-head{padding:18px 22px 14px;border-bottom:1px solid #0f2030;background:#030c18}
.r-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:1px}
.r-sub{font-size:11px;color:#f97316;margin-bottom:3px}
.r-vibe{font-size:10px;color:#1e3a5f;font-style:italic;margin-bottom:7px}
.r-tags{display:flex;gap:4px;flex-wrap:wrap}
.r-tag{padding:2px 8px;border-radius:20px;font-size:10px}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.meta-p{background:#0d1e35;border:1px solid #1a3050;border-radius:7px;padding:6px 10px;text-align:center}
.chords-row{margin-top:10px;padding:6px 12px;background:#0d1e35;border-radius:7px;border:1px solid #1a3050;display:inline-flex;align-items:center;gap:10px}

.tabs{display:flex;border-bottom:1px solid #0f2030;background:#030c18;padding:0 22px;flex-shrink:0}
.tab{padding:10px 14px;background:none;border:none;color:#1e3a5f;font-size:12px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .2s}
.tab.active{color:#f97316;border-bottom-color:#f97316;font-weight:600}
.tab-body{padding:18px 22px}

.sec-block{border:1px solid #1a3050;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#081525}
.sec-head{padding:8px 13px;display:flex;align-items:center;justify-content:space-between;background:#0d1e35;flex-wrap:wrap;gap:5px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-lbl{font-size:10px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.sbtn{padding:3px 9px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;color:#2d5070;font-size:10px;cursor:pointer;transition:all .15s}
.sbtn.eon{border-color:#f9731660;background:#f9731618;color:#f97316;font-weight:600}
.sbtn.ron{border-color:#ef444460;background:#ef444418;color:#ef4444;font-weight:600}
.sbtn.son{border-color:#22c55e60;background:#22c55e18;color:#22c55e;font-weight:600}
.sec-text{color:#6a9bbf;font-size:13px;line-height:1.9;white-space:pre-wrap;font-family:'Inter',sans-serif}
.sec-ta{width:100%;background:#050e1a;border:1px solid #1a3050;color:#c8ddf0;padding:9px 11px;border-radius:7px;font-size:13px;line-height:1.8;resize:vertical;min-height:90px}
.ia-panel{padding:0 13px 12px;border-top:1px solid #0f2030;display:none}
.ia-ta{width:100%;background:#050e1a;border:1px solid #1a3050;color:#c8ddf0;padding:8px 10px;border-radius:7px;font-size:11px;line-height:1.6;resize:none;height:60px}
.ext-panel{padding:0 13px 14px;border-top:1px solid #0f2030;display:none}
.vtabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.vtab{padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left;border:1px solid #1a3050;background:#060f1c;transition:all .15s}
.vtab.active{border-color:#22c55e;background:#22c55e18}
.mic-area{background:#060f1c;border:1px solid #1a3050;border-radius:9px;padding:13px;margin-bottom:9px}
.btn-mic{width:50px;height:50px;border-radius:50%;border:none;background:#22c55e;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 0 0 4px #22c55e30}
.btn-mic.rec{background:#ef4444;box-shadow:0 0 0 4px #ef444430}
.wave-wrap{display:flex;align-items:center;gap:3px;height:36px}
.wb{width:4px;border-radius:2px;background:#1a3050;min-height:4px;transition:height .08s}
.wb.active{background:#22c55e}
.trecho-preview{background:#060f1c;border:1px solid #22c55e33;border-radius:7px;padding:8px 11px;margin-bottom:9px;font-size:11px;color:#2d5070}
.btn-ext{width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#22c55e,#14b8a6);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-ext:disabled{background:#1a3050;color:#2d5070;cursor:not-allowed}
.btn-rw{margin-top:7px;padding:7px 16px;border-radius:7px;border:none;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-size:11px;cursor:pointer;font-weight:700}
.btn-rw:disabled{background:#1a3050;color:#2d5070;cursor:not-allowed}

.ex-box{background:#081525;border:1px solid #1a3050;border-radius:9px;overflow:hidden;margin-bottom:11px}
.ex-head{padding:8px 13px;background:#0d1e35;display:flex;justify-content:space-between;align-items:center}
.ex-pre{color:#4a7099;font-size:12px;line-height:1.9;white-space:pre-wrap;font-family:'Inter',sans-serif;padding:12px 14px}
.btn-copy{padding:3px 11px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer}

.info-box{background:#081525;border:1px solid #1a3050;border-radius:9px;padding:15px;margin-bottom:11px}
.inst-pill{background:#050e1a;border:1px solid #1a3050;border-radius:6px;padding:6px 11px;font-size:12px;color:#2d5070}

.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.lib-card{background:#081525;border:1px solid #1a3050;border-radius:10px;padding:14px;transition:border-color .2s}
.lib-card:hover{border-color:#2a4060}

.toast{position:fixed;bottom:18px;right:18px;z-index:999;padding:10px 15px;border-radius:9px;font-size:12px;font-weight:600;background:#081525;animation:fadeup .3s ease;max-width:280px;display:none;box-shadow:0 8px 24px #00000090}
.toast.show{display:block}
.toast.ok{border:1px solid #f9731660;color:#f97316}
.toast.err{border:1px solid #ef444460;color:#ef4444}
.spinner{width:12px;height:12px;border-radius:50%;border:2px solid #1a3050;border-top-color:#f97316;animation:spin .7s linear infinite;display:inline-block}

.steps-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.step-card{background:#081525;border-radius:9px;padding:11px 12px}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-bottom:7px}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">🎵</div>
  <span style="font-weight:700;font-size:13px;color:#fff">AI Music Studio</span>
  <span style="font-size:8px;color:#0f2030;letter-spacing:2px">BY CLAUDE</span>
  <button class="nav-tab active" id="nt-criar" onclick="setPage('criar')">🎵 Criar</button>
  <button class="nav-tab" id="nt-lib" onclick="setPage('lib')">📚 Biblioteca (<span id="lib-n">0</span>)</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <div class="sec-dot" id="sdot" style="background:#1e3a5f"></div>
    <span style="font-size:10px;color:#1e3a5f" id="stxt">API não validada</span>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sb-scroll">

      <div class="fsec">
        <label class="fl">🔑 API Key Anthropic</label>
        <div style="position:relative">
          <input type="password" id="api-key" class="fi" placeholder="sk-ant-api03-..." oninput="resetKey()"/>
          <span id="key-ic" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:12px"></span>
        </div>
        <button class="btn-val" id="btn-val" onclick="validateKey()">🔍 Validar Chave</button>
        <div style="font-size:9px;color:#0f2030;margin-top:3px">console.anthropic.com</div>
      </div>
      <div class="div"></div>

      <div class="fsec">
        <label class="fl">💡 Como você imagina sua música?</label>
        <textarea id="idea" class="fta" rows="3" placeholder="Ex: Uma sertaneja sobre saudade da roça, vovó fazendo bolo, cheiro de mato molhado depois da chuva..."></textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
        <div><label class="fl">🎵 Nome (opcional)</label><input id="titulo" class="fi" placeholder="Título..."/></div>
        <div><label class="fl">🎤 Referência</label><input id="artist" class="fi" placeholder="Marília, Wesley..."/></div>
      </div>
      <div class="div"></div>

      <div class="fsec">
        <label class="fl">⏱ Duração da Música</label>
        <div class="dur-grid" id="dur-grid"></div>
      </div>
      <div class="div"></div>

      <div class="fsec">
        <label class="fl">🎸 Estilo Musical</label>
        <div class="chips" id="genre-chips"></div>
      </div>
      <div class="div"></div>

      <div class="fsec">
        <label class="fl">🌈 Mood / Clima</label>
        <div class="chips" id="mood-chips"></div>
      </div>
      <div class="div"></div>

      <div class="fsec">
        <label class="fl">🎛 Efeitos e Instrumentos</label>
        <div class="chips" id="extras-chips"></div>
      </div>
      <div class="div"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div><label class="fl">🎙 Voz</label><div class="chips" id="voice-chips" style="flex-direction:column"></div></div>
        <div><label class="fl">⏱ BPM</label><div class="chips" id="tempo-chips" style="flex-direction:column"></div></div>
      </div>

      <div id="struct-wrap">
        <div class="div"></div>
        <div class="fsec">
          <label class="fl">🗺 Estrutura</label>
          <div class="chips" id="struct-chips"></div>
        </div>
      </div>
      <div class="div"></div>

      <div class="fsec" style="margin-bottom:14px">
        <label class="fl">🎚 Detalhes da Produção (opcional)</label>
        <textarea id="producao" class="fta" rows="2" placeholder="Ex: Bateria marcada, guitarra suave, voz potente no refrão..."></textarea>
      </div>
    </div>

    <div class="sb-foot">
      <button class="btn-gen" id="btn-gen" onclick="generate()">🎵 Compor com IA</button>
    </div>
  </div>

  <div class="content">
    <div id="page-criar" style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div class="c-scroll" id="c-scroll">
        <div class="empty" id="empty-state">
          <div style="font-size:72px;animation:pulse3 3s ease-in-out infinite">🎵</div>
          <div style="font-size:20px;font-weight:600;color:#0f2030">Sua música aparece aqui</div>
          <div style="font-size:13px;color:#0a1a2a;max-width:440px;line-height:1.8">Configure ao lado e clique em <strong style="color:#f97316">Compor com IA</strong> para criar sua música.</div>
          <div class="feat-grid">
            <div class="feat-card"><span style="font-size:16px">✏</span>Edite cada seção</div>
            <div class="feat-card"><span style="font-size:16px">🔄</span>Refaça com instruções</div>
            <div class="feat-card"><span style="font-size:16px">🎙</span>Cante seu trecho</div>
            <div class="feat-card"><span style="font-size:16px">✨</span>IA completa e estende</div>
          </div>
        </div>
        <div id="result-area" style="display:none"></div>
      </div>
    </div>

    <div id="page-lib" style="display:none;padding:22px;overflow-y:auto;height:100%">
      <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:4px">Biblioteca</div>
      <div style="font-size:12px;color:#1e3a5f;margin-bottom:18px">Músicas salvas automaticamente no navegador.</div>
      <div class="lib-grid" id="lib-grid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GENRES=[
  {id:"sertanejo",l:"Sertanejo",e:"🤠"},{id:"sertuniv",l:"Sertanejo Univ.",e:"🎸"},
  {id:"modao",l:"Modão",e:"🎺"},{id:"viola",l:"Viola Caipira",e:"🪕"},
  {id:"funk",l:"Funk Carioca",e:"🔥"},{id:"pagode",l:"Pagode",e:"🥁"},
  {id:"forro",l:"Forró",e:"🪗"},{id:"piseiro",l:"Piseiro",e:"👟"},
  {id:"bregafunk",l:"Brega Funk",e:"💥"},{id:"axe",l:"Axé",e:"🎉"},
  {id:"samba",l:"Samba",e:"🎺"},{id:"mpb",l:"MPB",e:"🎸"},
  {id:"bossanova",l:"Bossa Nova",e:"🎷"},{id:"pop",l:"Pop",e:"⭐"},
  {id:"rnb",l:"R&B",e:"🎤"},{id:"hiphop",l:"Hip-Hop",e:"🎧"},
  {id:"trap",l:"Trap",e:"💎"},{id:"rock",l:"Rock",e:"🎸"},
  {id:"gospel",l:"Gospel",e:"🙏"},{id:"eletro",l:"Eletrônica",e:"🎛"},
  {id:"lofi",l:"Lo-fi",e:"☕"},{id:"country",l:"Country",e:"🤠"},
  {id:"folk",l:"Folk",e:"🌾"},{id:"reggae",l:"Reggae",e:"🌿"},
  {id:"acustico",l:"Acústico",e:"🎸"},{id:"jazz",l:"Jazz",e:"🎷"},
  {id:"kizomba",l:"Kizomba",e:"💃"},{id:"afrobeat",l:"Afrobeat",e:"🌍"},
  {id:"worship",l:"Worship",e:"✝️"},{id:"tecnobrega",l:"Tecnobrega",e:"🔊"},
];
const MOODS=[
  {id:"romantico",l:"Romântico",e:"❤️"},{id:"alegre",l:"Alegre",e:"😄"},
  {id:"melancolico",l:"Melancólico",e:"😢"},{id:"saudosista",l:"Saudosista",e:"🌅"},
  {id:"energetico",l:"Energético",e:"⚡"},{id:"sensual",l:"Sensual",e:"🔥"},
  {id:"espiritual",l:"Espiritual",e:"✨"},{id:"festivo",l:"Festivo",e:"🎊"},
  {id:"nostalgico",l:"Nostálgico",e:"🌙"},{id:"agitado",l:"Agitado",e:"🤘"},
];
const EXTRAS=["Piano","Guitarra","Violão","Sanfona","Bateria forte","Baixo grave","808","Sintetizador","Orquestra","Coral","Autotune","Grave pesado","Lento","Rápido","Emotivo","Suave","Agressivo"];
const VOICES=[{id:"fs",l:"Feminino Suave"},{id:"fp",l:"Feminino Potente"},{id:"mg",l:"Masculino Grave"},{id:"mj",l:"Masculino Jovem"},{id:"dt",l:"Dueto M+F"}];
const TEMPOS=[{id:"0",l:"Lento · 70",bpm:70},{id:"1",l:"Moderado · 90",bpm:90},{id:"2",l:"Animado · 110",bpm:110},{id:"3",l:"Rápido · 130",bpm:130}];
const STRUCTS=["Intro","Verso 1","Pré-Refrão","Refrão","Verso 2","Bridge","Refrão Final","Outro"];
const DURATIONS=[
  {id:"jingle",l:"Jingle",desc:"30s–1min",icon:"⚡",note:"Gere APENAS 1 refrão curto e impactante com 4-6 linhas.",struct:["Refrão"]},
  {id:"curta",l:"Curta",desc:"1–2min",icon:"🎵",note:"Estrutura enxuta, seções com 4-5 linhas.",struct:["Verso 1","Refrão","Refrão Final"]},
  {id:"normal",l:"Normal",desc:"3–4min",icon:"🎶",note:"Padrão de rádio, seções com 5-8 linhas bem desenvolvidas.",struct:["Intro","Verso 1","Pré-Refrão","Refrão","Verso 2","Bridge","Refrão Final"]},
  {id:"longa",l:"Longa",desc:"5min+",icon:"🎼",note:"Música elaborada, seções com 6-10 linhas e repetições.",struct:["Intro","Verso 1","Pré-Refrão","Refrão","Verso 2","Pré-Refrão","Refrão","Bridge","Refrão Final","Outro"]},
];
const SEC_COLORS={"Intro":"#f97316","Verso 1":"#22c55e","Verso 2":"#22c55e","Pré-Refrão":"#eab308","Refrão":"#ef4444","Refrão Final":"#ef4444","Bridge":"#a855f7","Outro":"#64748b"};
const SEC_TAGS={"Intro":"[Intro]","Verso 1":"[Verse]","Verso 2":"[Verse 2]","Pré-Refrão":"[Pre-Chorus]","Refrão":"[Chorus]","Refrão Final":"[Chorus]","Bridge":"[Bridge]","Outro":"[Outro]"};

let selGenre="sertanejo",selMood="romantico",selVoice="fs",selTempo="1";
let selStruct=["Verso 1","Pré-Refrão","Refrão","Verso 2","Bridge","Refrão Final"];
let selExtras=[],selDuration="normal";
let currentSong=null,currentSections={},activeTab="editor",currentPage="criar";
let history=[];try{history=JSON.parse(localStorage.getItem("ams5")||"[]");}catch{}
let micRecognition=null,micRecording=false,waveTimer=null;

window.onload=()=>{
  buildDurCards();
  buildSingle("genre-chips",GENRES,"co",()=>selGenre,v=>selGenre=v);

async function generate(){

  if(!idea){showToast("Descreva sua ideia!","err");return;}
  const g=GENRES.find(x=>x.id===selGenre)||GENRES[0];
  const m=MOODS.find(x=>x.id===selMood)||MOODS[0];
  const v=VOICES.find(x=>x.id===selVoice)||VOICES[0];
  const t=TEMPOS.find(x=>x.id===selTempo)||TEMPOS[1];
  const dur=DURATIONS.find(d=>d.id===selDuration)||DURATIONS[2];
  const secsToUse=dur.id==="jingle"||dur.id==="curta"?dur.struct:selStruct;
  const extrasStr=selExtras.join(", ");
  const titulo=document.getElementById("titulo").value.trim();
  const artist=document.getElementById("artist").value.trim();
  const producao=document.getElementById("producao").value.trim();
  setLoading(true);currentSong=null;currentSections={};
  document.getElementById("empty-state").style.display="none";
  document.getElementById("result-area").style.display="none";
  const prompt=`Compositor musical profissional brasileiro de elite. Crie música COMPLETA e ORIGINAL.
- Tema: ${idea} | Gênero: ${g.l} | Mood: ${m.l} | BPM: ${t.bpm} | Voz: ${v.l}
- Duração: ${dur.l} (${dur.desc}) | Seções: ${secsToUse.join(", ")}
${titulo?`- Título sugerido: "${titulo}"`:""}${artist?`\n- Referência: ${artist}`:""}${extrasStr?`\n- Extras: ${extrasStr}`:""}${producao?`\n- Produção: ${producao}`:""}
INSTRUÇÃO DE DURAÇÃO: ${dur.note}
Letra PROFISSIONAL: rimas ricas, imagens poéticas, emoção real.
SOMENTE JSON válido:
{"title":"T","subtitle":"S","key":"K","chords":"C","vibe":"V","style_tags":["t1","t2","t3"],"sections":{${secsToUse.map(s=>`"${s}":"letra completa com \\n"`).join(",")}},"suno_style_prompt":"Prompt técnico em inglês para o Suno (min 60 palavras)","instruments":["i1","i2","i3","i4"],"production_notes":"Notas de produção detalhadas"}`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error?.message||"Erro API "+res.status);
    const text=(data.content||[]).map(b=>b.text||"").join("");
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    currentSong={...parsed,bpm:t.bpm,genre:g.l,mood:m.l,voice:v.l,duration:dur.l,durationDesc:dur.desc};
    currentSections=Object.assign({},parsed.sections||{});

    document.getElementById("c-scroll").scrollTop=0;
  }catch(e){showToast("Erro: "+e.message,"err");}
  finally{setLoading(false);}
}

function startMic(sid){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const statusEl=document.getElementById("mic-status-"+sid);
  if(!SR){if(statusEl)statusEl.textContent="⚠ Use Chrome/Edge para gravar voz";return;}
  micRecognition=new SR();micRecognition.lang="pt-BR";micRecognition.continuous=true;micRecognition.interimResults=true;
  micRecognition.onresult=e=>{
    let fin="";
    for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)fin+=e.results[i][0].transcript+" ";
    if(fin){const ta=document.getElementById("ext-trecho-"+sid);if(ta)ta.value+=(ta.value?" ":"")+fin.trim();}
  };
  micRecognition.onerror=()=>stopMic(sid);
  micRecognition.onend=()=>{if(micRecording)stopMic(sid);};
  micRecognition.start();micRecording=true;
  const btn=document.getElementById("mic-btn-"+sid);
  if(btn){btn.className="btn-mic rec";btn.textContent="⏹";}
  if(statusEl){statusEl.textContent="🔴 Gravando... cante ou fale!";statusEl.style.color="#ef4444";}
  const ww=document.getElementById("wave-wrap-"+sid);
  if(ww){
    ww.style.display="flex";
    waveTimer=setInterval(()=>{
      ww.querySelectorAll(".wb").forEach(b=>{b.style.height=(4+Math.random()*28)+"px";});
    },100);
  }
}
function stopMic(sid){
  if(micRecognition){micRecognition.stop();micRecognition=null;}
  clearInterval(waveTimer);micRecording=false;
  const btn=document.getElementById("mic-btn-"+sid);
  if(btn){btn.className="btn-mic";btn.textContent="🎙";}
  const statusEl=document.getElementById("mic-status-"+sid);
  if(statusEl){statusEl.textContent="✅ Gravação finalizada! Edite se precisar.";statusEl.style.color="#22c55e";}
  const ww=document.getElementById("wave-wrap-"+sid);
  if(ww){ww.style.display="none";ww.querySelectorAll(".wb").forEach(b=>{b.style.height="4px";});}
}
function toggleMic(sid){micRecording?stopMic(sid):startMic(sid);}

      </div>
    </div>
    <div id="body-${sid}" style="padding:10px 13px">
      <pre class="sec-text">${esc(currentSections[sec]||"")}</pre>
    </div>

    <div class="ia-panel" id="ia-panel-${sid}">
      <div style="font-size:10px;color:#2d5070;margin-bottom:6px;padding-top:10px">O que quer mudar nesta seção?</div>
      <textarea class="ia-ta" id="ia-ta-${sid}" placeholder='Ex: "Mais emotivo", "Rimas mais fluidas", "Fala de saudade"...'></textarea>
      <button class="btn-rw" id="btn-rw-${sid}" onclick="rewriteSection('${sec}')">🔄 Reescrever com IA</button>
    </div>

    <div class="ext-panel" id="ext-panel-${sid}">
      <div style="padding:10px 0 10px">
        <div style="font-size:10px;color:#22c55e;letter-spacing:2px;font-weight:700;margin-bottom:10px">✨ ESTENDER — A IA completa a partir do seu trecho</div>
        <div class="vtabs">
          <button class="vtab active" id="vt-escrever-${sid}" onclick="switchVtab('${sid}','escrever')">
            <div style="font-size:12px">✏ Escrever</div>
            <div style="font-size:10px;color:#2d5070">Digite o trecho</div>
          </button>
          <button class="vtab" id="vt-gravar-${sid}" onclick="switchVtab('${sid}','gravar')">
            <div style="font-size:12px">🎙 Cantar / Falar</div>
            <div style="font-size:10px;color:#2d5070">Use o microfone</div>
          </button>
        </div>
        <div id="vp-escrever-${sid}">
          <div style="font-size:10px;color:#2d5070;margin-bottom:6px">Cole ou escreva 1-3 linhas que vieram na sua cabeça:</div>
          <textarea id="ext-trecho-${sid}" class="ia-ta" style="height:70px;border-color:#22c55e44" placeholder='Ex: "Quando a chuva cai lá no sertão&#10;Lembrança boa vem de coração..."'></textarea>
        </div>
        <div id="vp-gravar-${sid}" style="display:none">
          <div class="mic-area">
            <div id="mic-status-${sid}" style="font-size:11px;color:#2d5070;text-align:center;margin-bottom:10px">Clique no microfone e cante ou fale seu trecho</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:14px">
              <button class="btn-mic" id="mic-btn-${sid}" onclick="toggleMic('${sid}')">🎙</button>
              <div class="wave-wrap" id="wave-wrap-${sid}" style="display:none">${waveBars}</div>
            </div>
          </div>
          <div style="font-size:10px;color:#1e3a5f;margin-bottom:6px">Transcrição (edite se precisar):</div>
          <textarea id="ext-trecho-${sid}" class="ia-ta" style="height:65px" placeholder="O texto transcrito aparece aqui automaticamente..."></textarea>
        </div>
        <div style="font-size:10px;color:#1e3a5f;margin:7px 0">A IA mantém seu trecho exatamente e completa com o mesmo ritmo e rima.</div>
        <button class="btn-ext" id="btn-ext-${sid}" onclick="extendSection('${sec}')">✨ Estender com IA</button>
      </div>
    </div>
  </div>`;
}

function buildSunoLyrics(){
  if(!currentSong||!currentSections)return"";
  return selStruct.filter(s=>currentSections[s]).map(s=>(SEC_TAGS[s]||"["+s+"]")+"\n"+currentSections[s]).join("\n\n");
}

function switchTab(tab){
  activeTab=tab;
  if(tab==="suno"){const el=document.getElementById("ex-lyrics");if(el)el.textContent=buildSunoLyrics();}
  ["editor","suno","info"].forEach(t=>{
    const tc=document.getElementById("tc-"+t);
    const btn=document.querySelector(`.tab[onclick="switchTab('${t}')"]`);
    if(tc)tc.style.display=t===tab?"block":"none";
    if(btn)btn.className="tab"+(t===tab?" active":"");
  });
}

function saveHistory(){
  const entry={id:Date.now(),title:currentSong.title,genre:currentSong.genre,mood:currentSong.mood,bpm:currentSong.bpm,duration:currentSong.duration,date:new Date().toLocaleDateString("pt-BR"),song:currentSong,sections:Object.assign({},currentSections),struct:[...selStruct]};
  history=[entry,...history].slice(0,30);
  try{localStorage.setItem("ams5",JSON.stringify(history));}catch{}
  updateLibN();
}
function updateLibN(){document.getElementById("lib-n").textContent=history.length;}
function renderLib(){
  const el=document.getElementById("lib-grid");
  if(!history.length){el.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:50px 20px"><div style="font-size:36px;opacity:.15;margin-bottom:10px">🎵</div><div style="font-size:13px;color:#1e3a5f">Nenhuma música ainda</div></div>`;return;}
  el.innerHTML=history.map(e=>`
    <div class="lib-card">
      <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:2px">${esc(e.title)}</div>
      <div style="font-size:11px;color:#f97316;margin-bottom:2px">${esc(e.genre)} · ${e.bpm} BPM · ${esc(e.duration||"Normal")}</div>
      <div style="font-size:10px;color:#1e3a5f;margin-bottom:10px">${esc(e.mood)} · ${e.date}</div>
      <div style="display:flex;gap:5px">
        <button onclick="loadEntry(${e.id})" style="flex:1;padding:6px;border-radius:6px;border:1px solid #f9731440;background:#f9731618;color:#f97316;font-size:11px;font-weight:600;cursor:pointer">✏ Editar</button>
        <button onclick="delEntry(${e.id})" style="padding:6px 10px;border-radius:6px;border:1px solid #1a3050;background:transparent;color:#1e3a5f;font-size:11px;cursor:pointer">🗑</button>
      </div>
    </div>`).join("");
}
function loadEntry(id){
  const e=history.find(x=>x.id===id);if(!e)return;
  currentSong=e.song;currentSections=e.sections;if(e.struct)selStruct=e.struct;
  activeTab="editor";setPage("criar");renderResult();showToast("Carregada!","ok");
}
function delEntry(id){
  history=history.filter(x=>x.id!==id);
  try{localStorage.setItem("ams5",JSON.stringify(history));}catch{}
  updateLibN();renderLib();showToast("Removida","ok");
}

function copyEl(id,msg){
  const el=document.getElementById(id);if(!el)return;
  const text=el.textContent||el.innerText;
  navigator.clipboard.writeText(text).then(()=>showToast(msg,"ok")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast(msg,"ok");
  });
}
function showToast(msg,type){
  const el=document.getElementById("toast");el.textContent=msg;el.className="toast show "+(type||"ok");setTimeout(()=>el.className="toast",3500);
}
function setLoading(on){
  const btn=document.getElementById("btn-gen");
  const dur=DURATIONS.find(d=>d.id===selDuration)||DURATIONS[2];
  btn.disabled=on;btn.innerHTML=on?'<span class="spinner"></span> Compondo com IA...':`${dur.icon} Compor ${dur.l} com IA`;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function safeid(s){return s.replace(/\s/g,"_").replace(/[^a-zA-Z0-9_]/g,"");}
</script>
