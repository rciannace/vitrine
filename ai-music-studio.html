<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Music Studio 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080400;color:#ffcc99;font-family:'Nunito',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#080400}
::-webkit-scrollbar-thumb{background:#331100;border-radius:2px}
textarea,input{outline:none!important;font-family:'Nunito',sans-serif}
button{font-family:'Nunito',sans-serif;cursor:pointer}
@keyframes fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flamePulse{0%,100%{opacity:1;transform:scaleY(1)}50%{opacity:.85;transform:scaleY(1.04)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px #ff440030}50%{box-shadow:0 0 44px #ff440070}}

.layout{display:flex;min-height:100vh;position:relative;z-index:5}
.bg-fire{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,#ff220015,transparent 70%),
  radial-gradient(ellipse 40% 40% at 20% 80%,#ff660010,transparent 60%),
  radial-gradient(ellipse 30% 30% at 80% 90%,#ff440010,transparent 60%);
  animation:flamePulse 4s ease-in-out infinite}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03;
  background-image:linear-gradient(#ff6600 1px,transparent 1px),linear-gradient(90deg,#ff6600 1px,transparent 1px);
  background-size:40px 40px}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;background:linear-gradient(180deg,#0f0600,#080300);
  border-right:1px solid #2a1000;display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;overflow-y:auto}
.logo-area{padding:18px 16px 14px;border-bottom:1px solid #1a0800;
  background:linear-gradient(135deg,#1a0800,#0f0500)}
.logo-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#ff4400,#ff8800);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;animation:glowPulse 3s ease-in-out infinite}
.logo-name{font-family:'Black Han Sans',sans-serif;font-size:15px;color:#ff6600;
  letter-spacing:1px;text-shadow:0 0 20px #ff660080}
.logo-sub{font-size:9px;color:#442200;letter-spacing:3px;margin-top:1px}

.api-area{padding:12px 16px;border-bottom:1px solid #1a0800}
.field-label{font-size:9px;color:#664422;letter-spacing:2px;margin-bottom:6px;
  display:block;font-weight:800;text-transform:uppercase}
.api-input{width:100%;background:#100600;color:#ffaa66;border:1px solid #2a1000;
  padding:8px 11px;border-radius:7px;font-size:11px;font-family:monospace;
  transition:border-color .2s}
.api-input.valid{border-color:#00cc66}
.api-input.invalid{border-color:#ff2200}
.api-wrap{position:relative}
.api-status{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px}
.btn-validate{width:100%;margin-top:7px;padding:7px;border-radius:7px;
  border:1px solid #ff660040;background:#ff660018;color:#ff6600;
  font-size:11px;font-weight:700;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.btn-validate.valid-state{border-color:#00cc6640;background:#00cc6618;color:#00cc66}
.btn-validate.invalid-state{border-color:#ff220040;background:#ff220018;color:#ff2200}
.api-hint{font-size:9px;color:#2a1000;margin-top:4px}

.form-area{padding:12px 16px;flex:1;overflow-y:auto}
.form-section{margin-bottom:14px}
.txt-input{width:100%;background:#100600;border:1px solid #2a1000;color:#ffaa66;
  padding:8px 11px;border-radius:7px;font-size:11px;font-family:'Nunito',sans-serif}
.txt-area{width:100%;background:#100600;border:1px solid #2a1000;color:#ffaa66;
  padding:9px 11px;border-radius:7px;font-size:12px;resize:vertical;
  min-height:80px;line-height:1.6;font-family:'Nunito',sans-serif}

.chip-wrap{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid #2a1000;
  background:transparent;color:#553311;transition:all .15s;
  display:inline-flex;align-items:center;gap:3px;font-family:'Nunito',sans-serif}
.chip:hover{color:#886633;border-color:#442200}
.chip.c-orange{border-color:#ff6600;background:#ff660020;color:#ff6600;font-weight:700}
.chip.c-red{border-color:#ff3300;background:#ff330020;color:#ff3300;font-weight:700}
.chip.c-blue{border-color:#0088ff;background:#0088ff20;color:#0088ff;font-weight:700}
.chip.c-green{border-color:#00cc66;background:#00cc6620;color:#00cc66;font-weight:700}
.chip.c-purple{border-color:#cc00ff;background:#cc00ff20;color:#cc00ff;font-weight:700}

.btn-area{padding:14px 16px;border-top:1px solid #1a0800}
.btn-generate{width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#ff2200,#ff8800);color:#fff;
  font-size:13px;font-weight:800;letter-spacing:.5px;transition:all .3s;
  box-shadow:0 4px 24px #ff440050;text-shadow:0 1px 4px #00000060;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-generate:disabled{background:#1a0800;color:#442200;box-shadow:none}

/* MAIN */
.main{flex:1;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;gap:18px;padding:40px;text-align:center}
.empty-icon{font-size:60px;filter:drop-shadow(0 0 30px #ff440080);animation:flamePulse 2s ease-in-out infinite}
.empty-title{font-family:'Black Han Sans',sans-serif;font-size:28px;color:#ff4400;
  letter-spacing:2px;text-shadow:0 0 30px #ff440080}
.empty-desc{font-size:13px;color:#442200;max-width:380px;line-height:1.8}
.empty-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.empty-card{background:#100600;border:1px solid #2a1000;border-radius:10px;
  padding:10px 16px;font-size:11px;color:#553311}

/* RESULT */
.result-header{padding:24px 28px 18px;border-bottom:1px solid #1a0800;
  background:linear-gradient(135deg,#0f0600,#0a0300)}
.song-title{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#ff6600;
  margin-bottom:3px;text-shadow:0 0 20px #ff660060}
.song-sub{font-size:12px;color:#ff9944;margin-bottom:5px}
.song-vibe{font-size:11px;color:#442200;font-style:italic}
.tag-pill{padding:2px 9px;border-radius:20px;font-size:10px;background:#1a0800;
  color:#664422;border:1px solid #2a1000}
.meta-pill{background:#100600;border:1px solid #2a1000;border-radius:8px;
  padding:7px 12px;text-align:center}
.meta-pill-ic{font-size:10px;color:#331100;margin-bottom:1px}
.meta-pill-v{font-size:11px;color:#cc6633;font-family:monospace}
.chords-bar{margin-top:14px;padding:8px 14px;background:#100600;border-radius:8px;
  border:1px solid #2a1000;display:inline-flex;align-items:center;gap:10px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #1a0800;background:#0a0400;padding:0 28px}
.tab-btn{padding:12px 16px;background:none;border:none;color:#442200;font-size:12px;
  border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;
  transition:all .2s;font-family:'Nunito',sans-serif;white-space:nowrap;font-weight:400}
.tab-btn.active{color:#ff6600;border-bottom-color:#ff6600;font-weight:700}
.tab-content{padding:22px 28px;display:none}
.tab-content.active{display:block;animation:fadeup .3s ease}

/* SECTION BLOCKS */
.sec-block{border:1px solid #2a1000;border-radius:12px;overflow:hidden;
  margin-bottom:10px;background:linear-gradient(135deg,#0f0800,#100500)}
.sec-head{padding:9px 14px;display:flex;align-items:center;
  justify-content:space-between;background:#150900}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-label{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;font-weight:800}
.sec-actions{display:flex;gap:5px}
.sec-btn{padding:3px 10px;border-radius:6px;border:1px solid #2a1500;
  background:transparent;color:#553311;font-size:10px;cursor:pointer;
  transition:all .15s;font-family:'Nunito',sans-serif}
.sec-btn:hover{color:#886633;border-color:#442200}
.sec-btn.edit-on{border-color:#ff660040;background:#ff660018;color:#ff6600}
.sec-btn.redo-on{border-color:#ff330040;background:#ff330018;color:#ff3300}
.sec-body{padding:10px 14px}
.sec-text{color:#cc8855;font-size:13px;line-height:1.9;white-space:pre-wrap;
  font-family:'Nunito',sans-serif}
.sec-textarea{width:100%;background:#0a0500;border:1px solid #2a1000;color:#ffaa66;
  padding:9px 11px;border-radius:7px;font-size:13px;line-height:1.8;
  resize:vertical;min-height:90px;font-family:'Nunito',sans-serif}
.instr-area{padding:0 14px 12px;border-top:1px solid #1a0800}
.instr-hint{font-size:10px;color:#442200;margin-bottom:6px;padding-top:10px}
.instr-ta{width:100%;background:#0a0500;border:1px solid #1e0800;color:#ffaa66;
  padding:8px 11px;border-radius:7px;font-size:11px;line-height:1.6;
  resize:none;height:65px;font-family:'Nunito',sans-serif}
.btn-rewrite{margin-top:7px;padding:7px 18px;border-radius:7px;border:none;
  background:linear-gradient(135deg,#ff3300,#ff8800);color:#fff;
  font-size:11px;cursor:pointer;font-weight:700;transition:all .2s}
.btn-rewrite:disabled{background:#1a0800;color:#442200;cursor:not-allowed}

/* SUNO EXPORT */
.steps-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.step-card{background:#100600;border-radius:10px;padding:13px 14px}
.step-num{width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;margin-bottom:9px;font-family:monospace}
.step-title{font-size:12px;color:#ffaa66;font-weight:600;margin-bottom:3px}
.step-desc{font-size:10px;color:#442200;line-height:1.5}
.export-box{background:#100600;border:1px solid #2a1000;border-radius:11px;
  overflow:hidden;margin-bottom:14px}
.export-head{padding:10px 14px;background:#150800;
  display:flex;justify-content:space-between;align-items:center}
.export-label{font-size:10px;letter-spacing:2px;font-weight:700}
.btn-copy{padding:4px 13px;border-radius:5px;font-size:10px;cursor:pointer;
  font-weight:700;font-family:'Nunito',sans-serif}
.export-body{padding:14px 16px}
.export-pre{color:#cc7744;font-size:12px;line-height:1.9;white-space:pre-wrap;
  font-family:'Nunito',sans-serif}

/* INFO */
.info-box{background:#100600;border:1px solid #2a1000;border-radius:11px;
  padding:18px;margin-bottom:14px}
.info-label{font-size:9px;color:#442200;letter-spacing:3px;
  margin-bottom:12px;font-weight:700;text-transform:uppercase}
.inst-wrap{display:flex;flex-wrap:wrap;gap:8px}
.inst-pill{background:#0a0400;border:1px solid #2a1000;border-radius:7px;
  padding:7px 13px;font-size:12px;color:#cc7744}
.prod-text{font-size:13px;color:#cc8855;line-height:1.9;white-space:pre-wrap}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:999;
  padding:11px 18px;border-radius:10px;font-size:12px;font-weight:600;
  background:#0f0600;animation:fadeup .3s ease;max-width:320px;display:none}
.toast.show{display:block}
.toast.ok{border:1px solid #ff6600;color:#ff8800;box-shadow:0 8px 28px #ff440030}
.toast.err{border:1px solid #ff2200;color:#ff4444;box-shadow:0 8px 28px #ff000030}

.spinner{width:13px;height:13px;border-radius:50%;border:2px solid #331100;
  border-top-color:#ff6600;animation:spin .7s linear infinite;display:inline-block}

@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative}
  .steps-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg-fire"></div>
<div class="bg-grid"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo-area">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="logo-icon">🎵</div>
        <div>
          <div class="logo-name">AI MUSIC STUDIO</div>
          <div class="logo-sub">PARA SUNO · BY CLAUDE</div>
        </div>
      </div>
    </div>

    <div class="api-area">
      <label class="field-label">🔑 API Key Anthropic</label>
      <div class="api-wrap">
        <input type="password" id="api-key" class="api-input" placeholder="sk-ant-api03-..."
          oninput="resetKeyStatus()"/>
        <div class="api-status" id="api-status"></div>
      </div>
      <button class="btn-validate" id="btn-validate" onclick="validateKey()">
        🔍 Validar Chave
      </button>
      <div class="api-hint">console.anthropic.com</div>
    </div>

    <div class="form-area">
      <div class="form-section">
        <label class="field-label">💡 Sua Ideia</label>
        <textarea id="idea" class="txt-area" placeholder="Descreva o tema, história, sentimento... Quanto mais detalhe, melhor a música!"></textarea>
      </div>
      <div class="form-section">
        <label class="field-label">🎤 Referência (opcional)</label>
        <input type="text" id="artist" class="txt-input" placeholder="Ex: Marília Mendonça, Wesley Safadão..."/>
      </div>
      <div class="form-section">
        <label class="field-label">🎸 Gênero</label>
        <div class="chip-wrap" id="genre-chips"></div>
      </div>
      <div class="form-section">
        <label class="field-label">🌈 Mood</label>
        <div class="chip-wrap" id="mood-chips"></div>
      </div>
      <div class="form-section">
        <label class="field-label">🎙 Tipo de Voz</label>
        <div class="chip-wrap" id="voice-chips"></div>
      </div>
      <div class="form-section">
        <label class="field-label">⏱ Andamento</label>
        <div class="chip-wrap" id="tempo-chips"></div>
      </div>
      <div class="form-section">
        <label class="field-label">🗺 Estrutura</label>
        <div class="chip-wrap" id="struct-chips"></div>
      </div>
    </div>

    <div class="btn-area">
      <button class="btn-generate" id="btn-gen" onclick="generate()">
        🎵 Compor com IA
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty-state">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">AI MUSIC STUDIO</div>
      <div class="empty-desc">Configure sua música na barra lateral, clique em <strong style="color:#ff6600">Compor com IA</strong> e receba a letra completa — edite, refaça e exporte pro Suno.</div>
      <div class="empty-cards">
        <div class="empty-card">✏ Edite seção por seção</div>
        <div class="empty-card">🔄 Refaça o que não gostou</div>
        <div class="empty-card">🚀 Exporte formatado pro Suno</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DADOS
// ═══════════════════════════════════════
const GENRES=[
  {id:"sertanejo",l:"Sertanejo",e:"🤠",s:"sertanejo universitário, viola caipira, voz emotiva"},
  {id:"funk",l:"Funk",e:"🔥",s:"funk carioca, baile funk, batida pesada, voz urbana"},
  {id:"pagode",l:"Pagode",e:"🥁",s:"pagode brasileiro, pandeiro, cavaquinho, voz suingada"},
  {id:"forro",l:"Forró",e:"🪗",s:"forró pé de serra, sanfona, zabumba, triângulo"},
  {id:"mpb",l:"MPB",e:"🎸",s:"MPB brasileira, voz expressiva, violão, harmonia rica"},
  {id:"bossanova",l:"Bossa Nova",e:"🎷",s:"bossa nova, jazz brasileiro, violão suave, voz íntima"},
  {id:"pop",l:"Pop",e:"⭐",s:"pop brasileiro, produção moderna, voz clara"},
  {id:"rnb",l:"R&B",e:"🎤",s:"R&B soul, voz melismática, groove, produção suave"},
  {id:"hiphop",l:"Hip-Hop",e:"🎧",s:"hip hop brasileiro, rap, beat, voz rítmica"},
  {id:"rock",l:"Rock",e:"🎸",s:"rock brasileiro, guitarras distorcidas, voz potente"},
  {id:"gospel",l:"Gospel",e:"🙏",s:"gospel brasileiro, coral, piano, voz poderosa"},
  {id:"eletro",l:"Eletrônico",e:"🎛",s:"eletrônico brasileiro, sintetizadores, drop, energia"},
  {id:"piseiro",l:"Piseiro",e:"👟",s:"piseiro nordestino, forró eletrônico, batida dançante"},
  {id:"axe",l:"Axé",e:"🎉",s:"axé music baiano, percussão, animado, festivo"},
  {id:"reggae",l:"Reggae",e:"🌿",s:"reggae roots brasileiro, riddim, voz relaxada"},
  {id:"samba",l:"Samba",e:"🎺",s:"samba tradicional, surdo, cavaquinho, gingado"},
];
const MOODS=[
  {id:"romantico",l:"Romântico",e:"❤️"},
  {id:"alegre",l:"Alegre",e:"😄"},
  {id:"melancolico",l:"Melancólico",e:"😢"},
  {id:"energetico",l:"Energético",e:"⚡"},
  {id:"saudosista",l:"Saudosista",e:"🌅"},
  {id:"sensual",l:"Sensual",e:"🔥"},
  {id:"espiritual",l:"Espiritual",e:"✨"},
  {id:"festivo",l:"Festivo",e:"🎊"},
];
const VOICES=[
  {id:"f_suave",l:"Feminino Suave",s:"female voice, soft, melodic"},
  {id:"f_potente",l:"Feminino Potente",s:"female voice, powerful, emotional"},
  {id:"m_grave",l:"Masculino Grave",s:"male voice, deep, strong"},
  {id:"m_jovem",l:"Masculino Jovem",s:"male voice, young, clear"},
  {id:"dueto",l:"Dueto M+F",s:"male and female duet, harmonized"},
];
const TEMPOS=[
  {l:"Lento · 70 BPM",bpm:70},
  {l:"Moderado · 90 BPM",bpm:90},
  {l:"Animado · 110 BPM",bpm:110},
  {l:"Rápido · 130 BPM",bpm:130},
];
const STRUCTS=["Intro","Verso 1","Pré-Refrão","Refrão","Verso 2","Bridge","Refrão Final","Outro"];
const SEC_COLORS={"Intro":"#ff6b00","Verso 1":"#ff3c00","Verso 2":"#ff3c00","Pré-Refrão":"#ff8800","Refrão":"#ff2200","Refrão Final":"#ff2200","Bridge":"#cc2200","Outro":"#884400"};
const SEC_TAGS={"Intro":"[Intro]","Verso 1":"[Verse]","Verso 2":"[Verse 2]","Pré-Refrão":"[Pre-Chorus]","Refrão":"[Chorus]","Refrão Final":"[Chorus]","Bridge":"[Bridge]","Outro":"[Outro]"};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let selGenre="sertanejo",selMood="romantico",selVoice="f_suave",selTempo=1;
let selStruct=["Verso 1","Pré-Refrão","Refrão","Verso 2","Bridge","Refrão Final"];
let currentSong=null,currentSections={},activeTab="editor";
let keyStatus=null; // null | checking | ok | err

// ═══════════════════════════════════════
// CHIPS
// ═══════════════════════════════════════
function initChips(){
  buildChips("genre-chips",GENRES,"c-orange",()=>selGenre,v=>selGenre=v);
  buildChips("mood-chips",MOODS,"c-red",()=>selMood,v=>selMood=v);
  buildChips("voice-chips",VOICES.map(v=>({id:v.id,l:v.l})),"c-purple",()=>selVoice,v=>selVoice=v);
  buildChips("tempo-chips",TEMPOS.map((t,i)=>({id:String(i),l:t.l})),"c-blue",()=>String(selTempo),v=>selTempo=parseInt(v));
  buildMulti("struct-chips",STRUCTS,"c-green",()=>selStruct,v=>selStruct=v);
}
function buildChips(cid,items,cls,getter,setter){
  const el=document.getElementById(cid);
  items.forEach(item=>{
    const id=item.id!==undefined?item.id:item.l;
    const b=document.createElement("button");
    b.className="chip"+(getter()===id?" "+cls:"");
    b.innerHTML=(item.e?"<span>"+item.e+"</span>":"")+item.l;
    b.onclick=()=>{setter(id);el.querySelectorAll(".chip").forEach(x=>x.className="chip");b.className="chip "+cls;};
    el.appendChild(b);
  });
}
function buildMulti(cid,items,cls,getter,setter){
  const el=document.getElementById(cid);
  items.forEach(item=>{
    const b=document.createElement("button");
    b.className="chip"+(getter().includes(item)?" "+cls:"");
    b.textContent=item;
    b.onclick=()=>{
      const c=getter();
      if(c.includes(item))setter(c.filter(x=>x!==item));
      else setter([...c,item]);
      b.className="chip"+(getter().includes(item)?" "+cls:"");
    };
    el.appendChild(b);
  });
}

// ═══════════════════════════════════════
// VALIDATE KEY
// ═══════════════════════════════════════
function resetKeyStatus(){
  keyStatus=null;
  const inp=document.getElementById("api-key");
  const btn=document.getElementById("btn-validate");
  const st=document.getElementById("api-status");
  inp.className="api-input";
  btn.className="btn-validate";
  btn.innerHTML="🔍 Validar Chave";
  st.textContent="";
}

async function validateKey(){
  const key=document.getElementById("api-key").value.trim();
  if(!key){showToast("Cole a API Key primeiro!","err");return;}
  keyStatus="checking";
  const btn=document.getElementById("btn-validate");
  const inp=document.getElementById("api-key");
  const st=document.getElementById("api-status");
  btn.innerHTML='<span class="spinner"></span> Validando...';
  btn.disabled=true;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:10,messages:[{role:"user",content:"hi"}]})
    });
    if(res.ok){
      keyStatus="ok";
      inp.className="api-input valid";
      st.textContent="✓";st.style.color="#00cc66";
      btn.className="btn-validate valid-state";
      btn.innerHTML="✅ Chave Válida!";
      showToast("✅ Chave válida! Pronto para compor!","ok");
    }else{
      throw new Error("invalida");
    }
  }catch(e){
    keyStatus="err";
    inp.className="api-input invalid";
    st.textContent="✗";st.style.color="#ff2200";
    btn.className="btn-validate invalid-state";
    btn.innerHTML="❌ Chave Inválida";
    showToast("❌ Chave inválida. Verifique no console.anthropic.com","err");
  }finally{
    btn.disabled=false;
  }
}

// ═══════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════
async function generate(){
  const apiKey=document.getElementById("api-key").value.trim();
  const idea=document.getElementById("idea").value.trim();
  if(!apiKey){showToast("Cole sua API Key primeiro!","err");return;}
  if(!idea){showToast("Descreva sua ideia musical!","err");return;}

  const g=GENRES.find(x=>x.id===selGenre);
  const m=MOODS.find(x=>x.id===selMood);
  const v=VOICES.find(x=>x.id===selVoice);
  const bpm=TEMPOS[selTempo].bpm;
  const artist=document.getElementById("artist").value.trim();
  const artistHint=artist?"\n- Referência: "+artist:"";

  setLoading(true);currentSong=null;currentSections={};

  const prompt=`Você é compositor musical profissional brasileiro de elite. Crie uma música COMPLETA e ORIGINAL.

ESPECIFICAÇÕES:
- Tema: ${idea}
- Gênero: ${g.l}
- Mood: ${m.l}
- BPM: ${bpm}
- Voz: ${v.l}
- Seções: ${selStruct.join(", ")}${artistHint}

Letra com QUALIDADE PROFISSIONAL: rimas ricas, imagens poéticas, emoção real. Mínimo 4 linhas por seção, refrão 6+.

Responda SOMENTE com JSON válido, sem markdown:
{
  "title":"Título",
  "subtitle":"Subtítulo criativo",
  "key":"Tom musical",
  "chords":"Progressão de acordes",
  "vibe":"Frase poética de uma linha",
  "style_tags":["tag1","tag2","tag3"],
  "sections":{${selStruct.map(s=>`"${s}":"letra completa com \\n"`).join(",")}},
  "suno_style_prompt":"Prompt técnico detalhado em inglês para o Suno (min 50 palavras): gênero, mood, instrumentos, BPM, voz, energia, referências",
  "instruments":["inst1","inst2","inst3","inst4"],
  "production_tips":"3-4 dicas de produção"
}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error?.message||"Erro API "+res.status);
    const text=(data.content||[]).map(b=>b.text||"").join("");
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    currentSong={...parsed,bpm,genre:g.l,mood:m.l,voice:v.l,genreId:selGenre};
    currentSections=Object.assign({},parsed.sections||{});
    activeTab="editor";
    renderResult();
    showToast("🎵 Música criada! Edite e exporte pro Suno!","ok");
    document.getElementById("main").scrollTop=0;
  }catch(e){
    showToast("Erro: "+e.message,"err");
  }finally{setLoading(false);}
}

// ═══════════════════════════════════════
// REWRITE
// ═══════════════════════════════════════
async function rewriteSection(secName){
  const apiKey=document.getElementById("api-key").value.trim();
  if(!apiKey||!currentSong)return;
  const safeId=secName.replace(/\s/g,"_");
  const instrEl=document.getElementById("instr-ta-"+safeId);
  const instruction=instrEl?instrEl.value.trim():"";
  if(!instruction){showToast("Descreva o que quer mudar!","err");return;}

  const btn=document.getElementById("btn-rw-"+safeId);
  if(btn){btn.disabled=true;btn.textContent="Reescrevendo...";}

  const g=GENRES.find(x=>x.id===currentSong.genreId);
  const prompt=`Compositor profissional. Reescreva SOMENTE esta seção.
Música: "${currentSong.title}" | Gênero: ${g?g.l:currentSong.genre} | Mood: ${currentSong.mood}
Seção "${secName}": ${currentSections[secName]}
Instrução: "${instruction}"
JSON apenas: {"lyrics":"nova letra com \\n"}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||"").join("");
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    currentSections[secName]=parsed.lyrics;
    renderResult();
    showToast("✨ "+secName+" reescrita!","ok");
  }catch(e){
    showToast("Erro: "+e.message,"err");
    if(btn){btn.disabled=false;btn.textContent="✨ Reescrever com IA";}
  }
}

// RENDER
// ═══════════════════════════════════════

  const s=currentSong;
  document.getElementById("main").innerHTML=`
  <div style="animation:fadeup .4s ease">

      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px">

          <div class="song-title">${esc(s.title)}</div>

          <div style="display:flex;gap:5px;margin-top:8px;flex-wrap:wrap">
            ${(s.style_tags||[]).map(t=>`<span class="tag-pill">#${esc(t)}</span>`).join("")}

        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-self:flex-start">

        </div>

        <span style="font-size:9px;color:#442200;letter-spacing:2px">ACORDES</span>
        <span style="font-family:monospace;font-size:15px;color:#ff8800;font-weight:700">${esc(s.chords||"")}</span>
        <span style="font-size:9px;color:#442200;letter-spacing:2px;margin-left:6px">TOM</span>
        <span style="font-family:monospace;font-size:15px;color:#ff4400">${esc(s.key||"")}</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${activeTab==="editor"?"active":""}" onclick="switchTab('editor')">✏ Editor de Letra</button>
      <button class="tab-btn ${activeTab==="suno"?"active":""}" onclick="switchTab('suno')">🚀 Exportar pro Suno</button>
      <button class="tab-btn ${activeTab==="info"?"active":""}" onclick="switchTab('info')">🎛 Produção</button>
    </div>

    <div class="tab-content ${activeTab==="editor"?"active":""}" id="tc-editor">
      <div style="max-width:680px">
        <div style="background:#100600;border:1px solid #2a1000;border-radius:10px;padding:11px 14px;margin-bottom:18px;display:flex;gap:10px">
          <span style="font-size:16px">🔥</span>
          <div style="font-size:11px;color:#553311;line-height:1.6">
            Clique em <strong style="color:#ff6600">✏ Editar</strong> para modificar, ou <strong style="color:#ff3300">🔄 Refazer</strong> para a IA reescrever a seção!
          </div>
        </div>
        ${selStruct.filter(sec=>currentSections[sec]).map(sec=>buildSecBlock(sec)).join("")}
      </div>
    </div>

    <div class="tab-content ${activeTab==="suno"?"active":""}" id="tc-suno">
      <div style="max-width:750px">
        <div class="steps-grid">
          ${[{n:"1",t:"Copie o Estilo",d:"Cole em 'Style of Music' no Suno",c:"#ff6600"},
             {n:"2",t:"Copie a Letra",d:"Cole em 'Lyrics' no Suno",c:"#ff3300"},
             {n:"3",t:"Gere no Suno",d:"Clique em Create e aproveite!",c:"#ff8800"}].map(step=>`
          <div class="step-card" style="border:1px solid ${step.c}25">
            <div class="step-num" style="background:${step.c}20;color:${step.c}">${step.n}</div>
            <div class="step-title">${step.t}</div>
            <div class="step-desc">${step.d}</div>
          </div>`).join("")}
        </div>
        <div class="export-box">
          <div class="export-head">
            <span class="export-label" style="color:#ff6600">STYLE OF MUSIC → cole no Suno</span>
            <button class="btn-copy" style="border:1px solid #ff660040;background:#ff660018;color:#ff6600"
              onclick="copyEl('ex-style','Estilo copiado! ✓')">📋 Copiar</button>
          </div>
          <div class="export-body"><pre class="export-pre" id="ex-style">${esc(s.suno_style_prompt||"")}</pre></div>
        </div>
        <div class="export-box">
          <div class="export-head">
            <span class="export-label" style="color:#ff3300">LYRICS → cole no Suno</span>
            <button class="btn-copy" style="border:1px solid #ff330040;background:#ff330018;color:#ff3300"
              onclick="copyEl('ex-lyrics','Letra copiada para o Suno! ✓')">📋 Copiar Letra</button>
          </div>
          <div class="export-body"><pre class="export-pre" id="ex-lyrics">${esc(buildSunoLyrics())}</pre></div>

function buildSecBlock(sec){
  const color=SEC_COLORS[sec]||"#ff6b00";
  const sid=sec.replace(/\s/g,"_");
  return `
  <div class="sec-block" id="sb-${sid}" style="border-left:3px solid ${color}">
    <div class="sec-head">
      <div style="display:flex;align-items:center;gap:7px">
        <div class="sec-dot" style="background:${color};box-shadow:0 0 8px ${color}"></div>
        <span class="sec-label" style="color:${color}">${esc(sec)}</span>
      </div>
      <div class="sec-actions">
        <button class="sec-btn" id="eb-${sid}" onclick="toggleEdit('${sid}','${sec}')">✏ Editar</button>
        <button class="sec-btn" id="rb-${sid}" onclick="toggleRedo('${sid}')">🔄 Refazer</button>
      </div>
    </div>
    <div class="sec-body" id="body-${sid}">
      <pre class="sec-text">${esc(currentSections[sec]||"")}</pre>
    </div>
    <div class="instr-area" id="ia-${sid}" style="display:none">
      <div class="instr-hint">O que quer mudar nesta seção?</div>
      <textarea class="instr-ta" id="instr-ta-${sid}" placeholder='Ex: "Quero mais emoção", "Muda as rimas", "Fala de saudade"...'></textarea>
      <button class="btn-rewrite" id="btn-rw-${sid}" onclick="rewriteSection('${sec}')">✨ Reescrever com IA</button>
    </div>
  </div>`;
}

function toggleEdit(sid,sec){
  const body=document.getElementById("body-"+sid);
  const btn=document.getElementById("eb-"+sid);
  const ia=document.getElementById("ia-"+sid);
  const rb=document.getElementById("rb-"+sid);
  if(body.querySelector("textarea")){
    const ta=body.querySelector("textarea");
    currentSections[sec]=ta.value;
    body.innerHTML=`<pre class="sec-text">${esc(currentSections[sec])}</pre>`;
    btn.className="sec-btn";btn.textContent="✏ Editar";
    const lyrEl=document.getElementById("ex-lyrics");
    if(lyrEl)lyrEl.textContent=buildSunoLyrics();
  }else{
    ia.style.display="none";rb.className="sec-btn";
    body.innerHTML=`<textarea class="sec-textarea" style="margin-top:4px">${esc(currentSections[sec]||"")}</textarea>`;
    body.querySelector("textarea").oninput=function(){currentSections[sec]=this.value;};
    btn.className="sec-btn edit-on";btn.textContent="✓ Salvar";
  }
}

function toggleRedo(sid){
  const ia=document.getElementById("ia-"+sid);
  const rb=document.getElementById("rb-"+sid);
  const body=document.getElementById("body-"+sid);
  const eb=document.getElementById("eb-"+sid);
  if(!ia)return;
  if(ia.style.display==="none"||!ia.style.display){
    if(body.querySelector("textarea")){
      const ta=body.querySelector("textarea");
      const sec=sid.replace(/_/g," ");
      currentSections[sec]=ta.value;
      body.innerHTML=`<pre class="sec-text">${esc(currentSections[sec])}</pre>`;
      eb.className="sec-btn";eb.textContent="✏ Editar";
    }
    ia.style.display="block";rb.className="sec-btn redo-on";
  }else{ia.style.display="none";rb.className="sec-btn";}
}

function buildSunoLyrics(){
  if(!currentSong||!currentSections)return"";
  return selStruct.filter(s=>currentSections[s])
    .map(s=>(SEC_TAGS[s]||"["+s+"]")+"\n"+currentSections[s]).join("\n\n");
}

function switchTab(tab){
  activeTab=tab;
  if(tab==="suno"){const el=document.getElementById("ex-lyrics");if(el)el.textContent=buildSunoLyrics();}
  ["editor","suno","info"].forEach(t=>{
    const tc=document.getElementById("tc-"+t);
    const btn=document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`);
    if(tc)tc.className="tab-content"+(t===tab?" active":"");
    if(btn)btn.className="tab-btn"+(t===tab?" active":"");
  });
}

function copyEl(id,msg){
  const el=document.getElementById(id);if(!el)return;
  const text=el.textContent||el.innerText;
  navigator.clipboard.writeText(text).then(()=>showToast(msg,"ok")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand("copy");
    document.body.removeChild(ta);showToast(msg,"ok");
  });
}

function showToast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="toast show "+(type||"ok");
  setTimeout(()=>el.className="toast",3500);
}

function setLoading(on){
  const btn=document.getElementById("btn-gen");
  if(on){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Compondo...';}
  else{btn.disabled=false;btn.innerHTML="🎵 Compor com IA";}
}

function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.onload=initChips;
</script>
